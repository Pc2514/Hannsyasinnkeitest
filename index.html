<!DOCTYPE html>
<html>
<head>
<title>Reflex Game</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:'Orbitron';
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* タイトル */
h1 {
  font-size:28px;
  margin-bottom:10px;
}

/* スコア */
#top {
  font-size:18px;
  margin-bottom:10px;
}

/* メイン */
#box {
  width:180px;
  height:180px;
  border-radius:15px;
  margin:20px;
  display:none;
}

/* 結果 */
#result {
  font-size:20px;
  margin:10px;
}

/* ボタン */
button {
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:#00c6ff;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<h1>REFLEX GAME</h1>

<div id="top">
  COMBO: <span id="combo">0</span>
</div>

<div id="box"></div>

<div id="result"></div>

<button onclick="start()">START</button>

<script>
let startTime, waiting;
let combo = 0;

// 音を1回だけ作る（軽量化）
const ctx = new (window.AudioContext||window.webkitAudioContext)();
const osc = ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();

function beep(freq){
  osc.frequency.value = freq;
}

function start(){
  box.style.display="block";
  box.style.background="red";
  waiting=true;

  let delay = Math.random()*2000+1500;

  setTimeout(()=>{
    box.style.background="lime";
    startTime = Date.now();
    waiting=false;
    beep(800);
  },delay);
}

box.onclick = function(){

  if(waiting){
    result.innerText="フライング";
    combo=0;
    return;
  }

  let reaction = Date.now()-startTime;

  if(reaction < 350){
    combo++;
    comboEl.innerText = combo;

    result.innerText = reaction+" ms";

    // 色変化
    box.style.background = `hsl(${combo*40},100%,50%)`;

    setTimeout(start,600);

  } else {
    result.innerText = "失敗 "+reaction+" ms";
    combo=0;
    comboEl.innerText = combo;
  }
}

const comboEl = document.getElementById("combo");
const box = document.getElementById("box");
const result = document.getElementById("result");
</script>

</body>
</html>
